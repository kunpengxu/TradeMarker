name: Generate derived TradeMarker data

on:
  workflow_dispatch:
  push:
    paths:
      - 'data/trademarker.json'
      - 'scripts/generate-derived-data.mjs'
      - '.github/workflows/derive-data.yml'

permissions:
  contents: write

jobs:
  derive:
    if: ${{ hashFiles('data/trademarker.json') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/generate-derived-data.mjs data/trademarker.json
      - name: Commit derived data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/data-diagnostics.json data/risk-summary.json data/ai-context.json
          git diff --cached --quiet || git commit -m "Update TradeMarker derived data"
          git push
