<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1220" />
    <title>TradeMarker</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.__TRADEMARKER_BOOT_ERROR__ = null;
      window.addEventListener('error', function (event) {
        window.__TRADEMARKER_BOOT_ERROR__ = event.message || 'Script error';
      });
      window.addEventListener('unhandledrejection', function (event) {
        window.__TRADEMARKER_BOOT_ERROR__ = event.reason && (event.reason.message || String(event.reason));
      });
      window.setTimeout(function () {
        var root = document.getElementById('root');
        if (!root || root.childElementCount) return;
        root.innerHTML = '<main style="min-height:100vh;display:grid;place-items:center;padding:24px;color:#e5edf8;font-family:Inter,system-ui,sans-serif"><section style="width:min(560px,100%);padding:22px;border:1px solid #21314c;border-radius:14px;background:#101a2c"><p style="margin:0 0 8px;color:#60a5fa;font-size:12px;font-weight:800;letter-spacing:.16em;text-transform:uppercase">TradeMarker</p><h1 style="margin:0 0 10px;font-size:28px">App script did not start</h1><p style="margin:0;color:#94a3b8">The HTML and CSS loaded, but the JavaScript app did not mount. Open DevTools Console and copy the first red error.</p><pre style="white-space:pre-wrap;margin:14px 0 0;color:#fca5a5">' + (window.__TRADEMARKER_BOOT_ERROR__ || 'No browser error was reported before timeout.') + '</pre></section></main>';
      }, 5000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
